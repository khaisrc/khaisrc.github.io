<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Things I've learned</title>

  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="icon" href="/favicon-16x16.png" type="image/png" sizes="16x16" />
  <link rel="icon" href="/favicon-32x32.png" type="image/png" sizes="32x32" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="manifest" href="/site.webmanifest" />

  <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link href="https://use.fontawesome.com/releases/v5.9.0/css/all.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/global.css">

  <script>
    // Must run before paint to avoid flash
    const tints = ['', 'green', 'blue', 'red', 'yellow', 'purple', 'orange', 'pink'];
    const tint = tints[Math.floor(Math.random() * tints.length)];
    if (tint) document.documentElement.setAttribute('data-tint', tint);

    const stored = localStorage.getItem('theme');
    if (stored) document.documentElement.setAttribute('data-mode', stored);
  </script>

  <style>
    /* ── Page-specific styles ── */

    .intro {
      font-weight: 700;
      font-size: calc(var(--font-size) * 1.5);
      line-height: calc(var(--theme-line-height-base) * 1.5rem);
      margin-bottom: calc(var(--theme-line-height-base) * 1rem);
    }

    .content-body ul {
      list-style-type: "▪";
      list-style-position: inside;
      text-indent: -1ch;
      padding-left: 1ch;
    }

    .content-body li + li {
      margin-top: calc(var(--theme-line-height-base) * 0.5rem);
    }
  </style>
</head>

<body>
  <a id="home-btn" href="/" title="Home" aria-label="Go to home">
    <i class="far fa-house"></i>
  </a>

  <button id="theme-toggle" title="Toggle dark mode" aria-label="Toggle dark mode">
    <i class="far fa-moon"></i>
  </button>

  <main>
    <content>
      <div class="intro">Things I've learned in life</div>
      <div class="content-body">
        <ul>
          <li>Don't promise when you're happy.</li>
          <li>Good things don't last forever. But so do bad ones.</li>
        </ul>
      </div>
    </content>
  </main>

  <script src="/js/global.js"></script>
</body>

</html>
